<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planejamento Semanal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      min-height: 100vh;
    }

    .print-btn {
      margin-bottom: 16px;
      padding: 10px 28px;
      background: #2a2a3a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-family: Arial, sans-serif;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    .print-btn:hover { background: #1a1a2a; }

    .page {
      position: relative;
      width: 100%;
      max-width: 960px;
      background: white;
      border-radius: 4px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 24px;
      overflow: hidden;
    }

    /* watermark handled via #logo-wrapper */

    table {
      width: 100%;
      border-collapse: collapse;
      border: 2px solid #2a2a3a;
      position: relative;
      z-index: 2;
    }

    .title-cell {
      background: #deebf6;
      text-align: center;
      padding: 10px 8px;
      border-bottom: 2px solid #1a1a2e;
    }
    .title-cell span {
      font-style: italic;
      font-weight: bold;
      font-size: 24px;
      color: #1a1a2e;
      font-family: Georgia, serif;
      letter-spacing: 1px;
    }

    .corner-cell {
      background: #deebf6;
      border: 1.5px solid #2a2a3a;
      width: 13%;
    }

    .day-header {
      background: #deebf6;
      border: 1.5px solid #2a2a3a;
      padding: 7px 4px;
      text-align: center;
      font-size: 12px;
      font-weight: bold;
      color: #1a1a2e;
      font-family: Arial, sans-serif;
      width: 17.4%;
    }
    .day-header .date-line {
      font-size: 11px;
      font-weight: normal;
      color: #1a1a2e;
      margin-top: 3px;
      letter-spacing: 0.3px;
    }

    .row-label {
      background: rgba(222,235,246,0.90);
      border: 1.5px solid #2a2a3a;
      padding: 10px 8px;
      font-style: italic;
      font-size: 13px;
      color: #1a1a2e;
      font-family: Georgia, serif;
      width: 13%;
      vertical-align: middle;
      text-align: left;
    }

    .content-cell {
      border: 1.5px solid #2a2a3a;
      background: rgba(255,255,255,0.88);
      padding: 7px 8px;
      vertical-align: top;
      font-size: 12px;
      color: #1a1a2e;
      font-family: Arial, sans-serif;
      line-height: 1.5;
      transition: background 0.2s;
    }
    .content-cell.active {
      background: rgba(255,255,255,0.88);
    }

    .short  { height: 58px; }
    .medium { height: 75px; }
    .tall   { height: 100px; }

    @media print {
      @page {
        size: A4 landscape;
        margin: 8mm;
      }
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      body {
        background: white !important;
        padding: 0 !important;
        display: block !important;
      }
      .print-btn { display: none !important; }
      .page {
        box-shadow: none !important;
        padding: 8px !important;
        border-radius: 0 !important;
        max-width: 100% !important;
        width: 100% !important;
        position: relative !important;
        overflow: visible !important;
      }
      table {
        border: 2px solid #2a2a3a !important;
        width: 100% !important;
        page-break-inside: avoid;
      }
      .title-cell {
        background-color: #deebf6 !important;
      }
      .day-header, .corner-cell, .row-label {
        background-color: #deebf6 !important;
      }
      .content-cell {
        background-color: rgba(255,255,255,0.88) !important;
      }
      .page {
        overflow: hidden !important;
      }
      #logo-wrapper {
        display: flex !important;
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 100% !important;
      }
      #logo-img {
        width: 38% !important;
        opacity: 0.42 !important;
      }
    }
  </style>
</head>
<body>

<button class="print-btn no-print" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>

<div class="page">

  <div id="logo-wrapper" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; align-items:center; justify-content:center; pointer-events:none; z-index:0; overflow:hidden;">
    <img id="logo-img" alt="Logo" style="width:55%; opacity:0.47;" />
  </div>

  <table id="mainTable">
    <colgroup>
      <col style="width:13%">
      <col style="width:17.4%">
      <col style="width:17.4%">
      <col style="width:17.4%">
      <col style="width:17.4%">
      <col style="width:17.4%">
    </colgroup>

    <thead>
      <tr>
        <td colspan="6" class="title-cell">
          <span id="periodoTitle">Manhã</span>
        </td>
      </tr>
      <tr>
        <td class="corner-cell"></td>
        <td class="day-header">Segunda-feira<div class="date-line" id="date-seg">____/____/____</div></td>
        <td class="day-header">Terça-feira<div class="date-line" id="date-ter">____/____/____</div></td>
        <td class="day-header">Quarta-feira<div class="date-line" id="date-qua">____/____/____</div></td>
        <td class="day-header">Quinta-feira<div class="date-line" id="date-qui">____/____/____</div></td>
        <td class="day-header">Sexta-feira<div class="date-line" id="date-sex">____/____/____</div></td>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td class="row-label short">Proposta e Espaço</td>
        <td class="content-cell short" data-field="proposta" data-dia="seg"></td>
        <td class="content-cell short" data-field="proposta" data-dia="ter"></td>
        <td class="content-cell short" data-field="proposta" data-dia="qua"></td>
        <td class="content-cell short" data-field="proposta" data-dia="qui"></td>
        <td class="content-cell short" data-field="proposta" data-dia="sex"></td>
      </tr>
      <tr>
        <td class="row-label short">Materiais</td>
        <td class="content-cell short" data-field="materiais" data-dia="seg"></td>
        <td class="content-cell short" data-field="materiais" data-dia="ter"></td>
        <td class="content-cell short" data-field="materiais" data-dia="qua"></td>
        <td class="content-cell short" data-field="materiais" data-dia="qui"></td>
        <td class="content-cell short" data-field="materiais" data-dia="sex"></td>
      </tr>
      <tr>
        <td class="row-label medium">Intencionalidade</td>
        <td class="content-cell medium" data-field="intencionalidade" data-dia="seg"></td>
        <td class="content-cell medium" data-field="intencionalidade" data-dia="ter"></td>
        <td class="content-cell medium" data-field="intencionalidade" data-dia="qua"></td>
        <td class="content-cell medium" data-field="intencionalidade" data-dia="qui"></td>
        <td class="content-cell medium" data-field="intencionalidade" data-dia="sex"></td>
      </tr>
      <tr>
        <td class="row-label tall">Desenvolvimento</td>
        <td class="content-cell tall" data-field="desenvolvimento" data-dia="seg"></td>
        <td class="content-cell tall" data-field="desenvolvimento" data-dia="ter"></td>
        <td class="content-cell tall" data-field="desenvolvimento" data-dia="qua"></td>
        <td class="content-cell tall" data-field="desenvolvimento" data-dia="qui"></td>
        <td class="content-cell tall" data-field="desenvolvimento" data-dia="sex"></td>
      </tr>
      <tr>
        <td class="row-label tall">Leitura Diária</td>
        <td class="content-cell tall" data-field="leitura" data-dia="seg"></td>
        <td class="content-cell tall" data-field="leitura" data-dia="ter"></td>
        <td class="content-cell tall" data-field="leitura" data-dia="qua"></td>
        <td class="content-cell tall" data-field="leitura" data-dia="qui"></td>
        <td class="content-cell tall" data-field="leitura" data-dia="sex"></td>
      </tr>
    </tbody>
  </table>
</div>

<script>
  function getParam(name) {
    return new URL(window.location.href).searchParams.get(name) || '';
  }

  // AppSheet às vezes envia {"Url":"https://...","LinkText":"..."} — extrai URL limpa
  function extractUrl(raw) {
    if (!raw) return '';
    try { const o = JSON.parse(raw); if (o && o.Url) return o.Url; } catch(_) {}
    return raw;
  }

  // ── LOGO WATERMARK via &logo= (igual ao modelo que funciona) ──
  (function loadLogo() {
    const rawLogo = extractUrl(getParam('logo'));
    if (!rawLogo) return;

    const img     = document.getElementById('logo-img');
    const wrapper = document.getElementById('logo-wrapper');

    const matchLogo = rawLogo.match(/[-\w]{25,}/);
    if (!matchLogo) return;
    const logoId    = matchLogo[0];
    const primary   = 'https://lh3.googleusercontent.com/d/' + logoId;
    const fallback  = 'https://drive.google.com/uc?export=view&id=' + logoId;

    function showLogo(src) {
      img.onload  = null;
      img.onerror = null;
      img.src = src;
      wrapper.style.display = 'flex';
    }

    img.onload  = function() { showLogo(img.src); };
    img.onerror = function() { if (fallback && img.src !== fallback) img.src = fallback; };
    img.src = primary;
  })();

  // ── PERÍODO ──
  const periodoRaw = getParam('periodo') || 'Manhã';
  // Converte para título: MANHÃ → Manhã
  const periodo = periodoRaw.charAt(0).toUpperCase() + periodoRaw.slice(1).toLowerCase();
  document.getElementById('periodoTitle').textContent = periodo;

  // ── DATA E DIA ──
  const data = getParam('data');
  const dia  = getParam('dia').toLowerCase();
  if (dia && data) {
    const el = document.getElementById('date-' + dia);
    if (el) el.textContent = data;
  }

  // ── PREENCHE CÉLULAS ──
  const fields = {
    proposta:         getParam('proposta'),
    materiais:        getParam('materiais'),
    intencionalidade: getParam('intencionalidade'),
    desenvolvimento:  getParam('desenvolvimento'),
    leitura:          getParam('leitura')
  };

  if (dia) {
    Object.entries(fields).forEach(([field, value]) => {
      const cell = document.querySelector(
        '[data-field="' + field + '"][data-dia="' + dia + '"]'
      );
      if (cell) {
        cell.textContent = value;
        if (value) cell.classList.add('active');
      }
    });
  }
</script>
</body>
</html>
